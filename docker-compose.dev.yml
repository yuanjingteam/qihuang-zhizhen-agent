services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    command: npx next dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://tcm:tcm_pass@postgres:5432/tcm_os
      - CHROMA_URL=http://chromadb:8000
      - LLM_BASE_URL=http://llm:11434/v1
      - LLM_MODEL_NAME=qwen2.5:1.5b
    ports:
      - "3000:3000"

  postgres:
    ports:
      - "5432:5432"

  chromadb:
    ports:
      - "8100:8000"

  llm:
    ports:
      - "11434:11434"

volumes:
  node_modules:
  next_cache:
